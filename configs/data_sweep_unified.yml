# Unified Data Sweep Configuration
# =================================
# Single configuration file for complete hyperparameter sweep over data filtering
# parameters to understand N (sample sizes) and memory consumption.
#
# Total: 84 experiments, strictly ordered by expected load (fastest → slowest)
# Load factor = days × max_liking_users × max_likes_per_user
#
# Usage:
#   python scripts/run_data_sweep.py --config configs/data_sweep_unified.yml --dry-run
#   python scripts/run_data_sweep.py --config configs/data_sweep_unified.yml
#   python scripts/run_data_sweep.py --config configs/data_sweep_unified.yml --resume

sweep:
  name: "data_sweep_unified"
  description: "Comprehensive sweep over data filtering hyperparameters"
  
  project: "Engagement Prediction"
  
  tags:
    - "data-sweep"
    - "memory-analysis"
    - "attrition-analysis"

# Fixed parameters for all experiments
fixed:
  data_source: "greenearth"
  gcs_bucket: "greenearth-471522-ingex-extract-stage"
  posts_start: "2026-01-01"
  likes_start: "2026-01-01"
  min_likes_per_user: 2
  cap_random_seed: 42
  embedding_model: "all_MiniLM_L6_v2"
  skip_memory_check: true
  stop_after: "get_data"

# All experiments ordered by load factor: days × users × likes_cap
# Within same load, ordered by: days (asc), users (asc), likes (asc), negatives (asc)
